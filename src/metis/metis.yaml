psql_database:
  provider: "config"
  credentials:
    username: "metis_user"
    password: "metis_password"
    host: "localhost"
    port: 5432
    database_name: "metis_db"

metis_engine:
  max_token_length: 250000
  max_workers: 8
  review_max_workers: 8
  triage_max_workers: 8
  embed_batch_size: 16
  embed_cache_enabled: true
  embed_cache_max_mb: 500
  async_llm_enabled: false
  retrieval_cache_max_entries: 1024
  triage_checkpoint_every: 50
  triage_tool_timeout_seconds: 12
  embed_dim: 3072
  hnsw_kwargs:
    hnsw_m: 16
    hnsw_ef_construction: 64
    hnsw_ef_search: 40
    hnsw_dist_method: "vector_cosine_ops"

filters:
  skip_test_files: false
  extra_test_path_patterns: []

review:
  mode: standard
  agentic:
    max_iterations: 2
    max_tool_calls: 4
    tool_timeout_seconds: 5
    max_extra_tokens: 8000
    wallclock_seconds: 60

research:
  hunters:
    - "authz_outlier"
    - "command_injection"
    - "code_injection"
    - "crypto_misuse"
    - "template_injection"
    - "sql_injection"
    - "injection_path"
    - "nosql_injection"
    - "path_traversal"
    - "ssrf"
    - "deserialization"
    - "xss"
    - "xxe"
    - "iac_exposure"
    - "memory_lifetime"
    - "hardware_security"
  budget: standard
  emit_killed: false
  emit_unresolved: false
  proof_artifacts: false
  evidence_policy: triage_evidence

llm_provider:
  name: "openai"
  model: "gpt-5.5"
  # Optional for reasoning-capable OpenAI models: none, minimal, low, medium,
  # high, or xhigh depending on model support. Can be overridden under query.
  # reasoning_effort: "medium"
  code_embedding_model: "text-embedding-3-large"
  docs_embedding_model: "text-embedding-3-large"

query:
  similarity_top_k: 5
  response_mode: "tree_summarize"
  max_tokens: 5000
  temperature: 0.0
