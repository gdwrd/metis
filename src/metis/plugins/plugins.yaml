docs:
  supported_extensions:  [".md", ".html", ".txt", ".pdf", ".rst"]

general_prompts:
  custom_guidance_precedence: |-
    Instruction precedence: When 'Custom Guidance' conflicts with any default
    instructions or checks below, follow 'Custom Guidance'. If guidance excludes
    certain issue classes, omit them from analysis and do not report them unless
    directly necessary to explain another issue.
  retrieve_context: |-
    You are a senior software engineer and your task is to explain what the following FILE does and what its purpose is.
    Include any data flows, function calls, or dependencies that could impact security.
    Make sure you flag any function input that is externally controlled.
    FILE: {file_path}
  security_review_report: |-
    3. How to Report
        - List all identified security issues in a JSON array.
        - Each element must strictly follow this structure:
          [[REVIEW_SCHEMA_FIELDS]]
        - IMPORTANT: If no identified security issues are found, return: {\"reviews\": []}
  triage_system_prompt: |-
    You triage static analysis findings.
    Decide whether the finding is valid, invalid, or inconclusive based on static code evidence.
    Treat the reported line as potentially inaccurate.
    Prefer inspecting nearby code first with sed/cat in the reported file, then resolve symbols across the whole codebase.
    Use grep to locate related symbols, definitions, references, and call/use sites when direct evidence is missing.
    Focus on concrete evidence from code and avoid speculation.
    Keep the reasoning language-agnostic: do not assume language-specific mechanisms unless evidence shows them.
    Deterministic rubric:
    - Return status=valid only when concrete evidence supports the finding and the resolution chain is clear.
    - Return status=inconclusive when wrappers/aliases/indirections exist but resolution is incomplete.
    - Return status=invalid only when concrete evidence contradicts the finding.
    - For valid, include at least one evidence citation in file:line format and a non-empty resolution_chain.
  triage_decision_prompt: |-
    Given the finding details, RAG context, and tool outputs, return a final triage decision.
    The reported line number might be off; rely on nearby code regions and related symbols.
    If evidence is not at the exact reported line, use closest relevant function/block and call sites.
    Search for definitions and references across the whole codebase before concluding inconclusive.
    Do not use speculative language. Use only provided evidence.
    Evidence citations must use file:line format.
    Keep reason text compact and deterministic with this structure:
    - Verdict: one sentence.
    - Evidence: one sentence with key citations.
    - Gap: one sentence (or "none") if unresolved.
    Always include:
    - resolution_chain: ordered hops from reported behavior to concrete evidence
    - unresolved_hops: unresolved alias/wrapper/indirection hops (empty if none)
    Prefer status=inconclusive only when critical unresolved hops remain after analyzing tool outputs and fallback evidence.

    {triage_input}

    Tool Outputs:
    {tool_outputs}
  hardware_cwe_guidance: |-
    2. What to Check (CWE-based, hardware-focused)
       - Treat ALL control/inputs as potentially adversarial unless explicitly proven internal-only[[RELEVANT_CONTEXT_INTERNAL_ONLY_SUFFIX]].
         Externally-controlled candidates commonly include: reset, clock enables, test/debug enables,
         strap pins, fuse/OTP reads, JTAG/scan signals, memory-mapped register writes, bus transactions,
         interrupt lines, and power/debug state transitions.

       - Prioritize CWEs from the Hardware Design corpus and the 2025 MIHW slice, mapping RTL patterns to root causes:
       - Use CWE IDs explicitly when you report findings.

       A) Reset/Initialization & Secure Defaults
          - CWE-1271: Uninitialized value on reset for security-critical registers.
            Look for flops controlling lock/debug enable/auth/privilege state without deterministic reset.
            Also watch for reset removal/weakening.
            (Example language includes Verilog/SystemVerilog in CWE content.)

       B) Access Control, Locking, and Debug/Test Control
          - CWE-1191: On-chip debug/test interface with improper access control.
            Look for JTAG/scan/test modes, debug unlock FSMs, lifecycle state checks missing/incorrect,
            or "backdoor" enables that bypass policy.
          - CWE-1234: Debug/internal modes allow override of locks.
            Look for debug/test conditional paths that can bypass lock bits or privilege checks.
          - CWE-1231 / CWE-1233: Lock bit modification or missing lock bit protection.
            Look for lock bits that can be rewritten, cleared, or are not sticky across modes/resets as intended.
          - CWE-1244: Internal asset exposed to unsafe debug access level or state.
            Look for debug access level/state that incorrectly exposes secrets or internal assets across boot stages or modes.
          - CWE-1262: Improper access control for register interface.
            Look for CSR/MMIO decode missing privilege checks, missing address range checks,
            or "write-1-to-clear"/side-effect regs exposed to untrusted masters.
          - CWE-1256: Improper restriction of software interfaces to hardware features.
            Look for privileged hardware features exposed to software without proper gating, policy, or lifecycle checks.

       C) Resource Reuse / Data Lifetime / State Transitions
          - CWE-226: Sensitive info not removed before reuse.
            Look for key material/state registers reused across sessions/contexts without zeroization.
          - CWE-1272: Sensitive info uncleared before debug/power state transition.
            Look for low-power entry/exit, debug entry/exit, reset-like transitions that do not clear secrets.

       D) Logic Races, Glitches, and Security FSM Robustness
          - CWE-1298: Hardware logic contains race conditions.
            Look for combinational/glitch-prone access control, async enables, multi-path gating,
            or timing-dependent conditions in security FSMs (especially around unlock/auth/privilege).
          - CWE-1247: Improper protection against voltage/clock glitches.
            Where relevant, look for single-point checks without redundancy/temporal hardening in critical flows
            (e.g., debug unlock, secure boot gating, privilege transitions).

       E) SoC Isolation / Overlap & Boundaries (when module participates in fabric/ACLs)
          - CWE-1189: Improper isolation of shared resources on SoC.
            Look for missing separation between trusted/untrusted masters, shared memory/register banks, or interconnect policy hooks.
          - CWE-1260: Improper handling of overlap between protected memory ranges.
            Look for decode/region logic that allows overlap/bypass of protection windows.

       F) Cryptography & Side-Channel Relevant RTL Exposures (when applicable)
          - CWE-1431: Driving intermediate cryptographic state/results to module outputs.
            Look for intermediate round/state registers reaching outputs, debug ports, status regs, or scan-visible flops.
          - CWE-1300: Improper protection of physical side channels.
            Look for obvious data-dependent switching/control that exposes secrets when mitigations are expected by context.

       G) Microarchitectural Shared State / Transient Execution (when applicable)
          - CWE-1421: Exposure of sensitive information in shared microarchitectural structures during transient execution.
            Look for shared caches/TLBs/queues or other structures that are not partitioned or flushed across trust boundaries.
          - CWE-1423: Exposure of sensitive information caused by shared microarchitectural predictor state that influences transient execution.
            Look for predictor/pre-fetch state that can be trained across domains without isolation, reset, or partitioning.

       - For every issue:
         * Identify the exact signal/always block/assign/ifdef that causes it.
         * State what is externally controllable and how it can influence the failure mode.
         * Classify severity (CRITICAL/HIGH/MEDIUM/LOW) and preconditions (mode, lifecycle, debug strap, etc.).
         * Recommend RTL-level remediation (reset defaults, sticky locks, privilege checks, zeroization sequencing,
           glitch-hardening, redundancy/temporal checks, CDC-safe enables, etc.).
       - Do not report issues that do not affect security.

plugins:
  c:
    supported_extensions: [".c", ".h", ".cc"]
    splitting: &c_cpp_splitting
      chunk_lines: 40
      chunk_lines_overlap: 15
      max_chars: 1500
    prompts: &c_cpp_prompts
      security_review_file: |-
        You are a thorough security engineer specializing in C/C++.
        Always tie your identified issues directly to the evidence in FILE[[RELEVANT_CONTEXT_FILE_EVIDENCE_SUFFIX]].
        Do not introduce new security conclusions that are not supported by the specific changes[[RELEVANT_CONTEXT_CHANGES_PROVIDED_SUFFIX]] provided.
        You will be given:
        1. FILE - A source code file
        [[RELEVANT_CONTEXT_INPUT_CHANGES]]

        Your tasks are:
        1. Security Review Scope
           - Review the security implications of the FILE.
           - Only produce findings that are fully justified by FILE[[RELEVANT_CONTEXT_FILE_EVIDENCE_SUFFIX]]. If no real issues exist, return an empty reviews list.
           [[RELEVANT_CONTEXT]]
      security_review: |-
        You are a thorough security engineer specializing in C/C++.
        Always tie your identified issues directly to the evidence in FILE_CHANGES[[RELEVANT_CONTEXT_PATCH_EVIDENCE_SUFFIX]],
        and ORIGINAL_FILE. Do not introduce new security conclusions that are not supported
        by the specific changes[[RELEVANT_CONTEXT_CHANGES_PROVIDED_SUFFIX]] provided.
        You will be given:
        1. FILE_CHANGES - a set of code changes with lines marked by “+” indicating what has been added or “-” for removed.
        [[RELEVANT_CONTEXT_INPUT_CHANGES]]
        [[ORIGINAL_FILE_INDEX_DOT]] ORIGINAL_FILE - The original file before being modified. Use this to understand how changes affect the code. (this may be empty).

        Your tasks are:
        1. Security Review Scope
           - Review the security implications of the FILE_CHANGES, focusing on lines marked with “+” or “-” but take into account how they interact with the whole file.
           - Only produce findings that are fully justified by FILE_CHANGES, ORIGINAL_FILE [[RELEVANT_CONTEXT_PATCH_JUSTIFICATION_SUFFIX]]. If no real issues exist, return an empty reviews list.
           [[RELEVANT_CONTEXT]]
      security_review_checks: |-
        2. What to Check
           - Look for potential security issues such as:
             - Memory safety issues
             - Memory aliasing issues
             - Buffer overflows
             - Unsafe function usage
             - Integer overflows
             - Integer underflows
             - Injection vulnerabilities
             - Concurrency issues
               + Specifically watch for removed wait calls or altered synchronization paths
                 that may lead to race conditions or use-after-free.
             - Use of insecure functions
             - Null pointer dereference
             - Use after free
               + Pay special attention to scenarios where an object is freed or a resource is terminated
                 while a job, firmware thread, or callback is still referencing it.
           - IMPORTANT: If the code already checks that pointers are non-null or logically ensures they cannot be null, do not raise a 'null pointer dereference' issue.
           - Pay extra attention to variables that are externally controlled.
           - Do not report on issues that do not affect security.
      validation_review: |-
        You will be given:
        SNIPPET: The relevant C/C++ code snippet.
        RELEVANT CONTEXT: Additional details or commentary on the snippet.
        REVIEW: A list of potential security issues discovered in the code changes.

        Your task is to:
        1. Carefully examine each item in the REVIEW. Check if it's a genuine security concern by referencing the SNIPPET and RELEVANT CONTEXT.
        2. Remove any issues that are false positives or are already mitigated in the code (e.g., null checks exist, safe boundaries are enforced, etc.).
        3. Keep only the issues that definitely represent real security risks.
        4. If an issue is missing details, add the necessary clarifications or background.
        5. If no real issues remain after validation, respond with an empty array: [].
      snippet_security_summary: |-
        You are a thorough security engineer specializing in C/C++.
        You will be given a concatenated list all identified security issues that have been identified in a code review.
        Summarize all the issues in a single paragraph and explain what changed in the code patch and how it affects security.
      attempt_fix: |-
        You are an experienced software engineer specializing in secure coding. Based on the following identified security issues:\n
        {issues}\n
        and the patch file:\n
        {patch}\n
        Please update the patch file so that is fixes these vulnerabilities.
        Do not include any commentary—only output the patch diff.
  systemverilog:
    supported_extensions: [".sv", ".svh", ".sv.*", ".svh.*"]
    splitting:
      chunk_lines: 60
      chunk_lines_overlap: 20
      max_chars: 2500
    prompts:
      security_review: |-
        You are a thorough security engineer specializing in RTL security for SystemVerilog designs.
        Always tie your identified issues directly to the evidence in FILE_CHANGES[[RELEVANT_CONTEXT_PATCH_EVIDENCE_SUFFIX]],
        and ORIGINAL_FILE. Do not introduce new security conclusions that are not supported by
        the specific changes[[RELEVANT_CONTEXT_CHANGES_PROVIDED_SUFFIX]] provided.

        You will be given:
        1. FILE_CHANGES - a set of SystemVerilog code changes with lines marked by "+" (added) or "-" (removed).
        [[RELEVANT_CONTEXT_INPUT_RTL]]
        [[ORIGINAL_FILE_INDEX_DOT]] ORIGINAL_FILE - the original file before being modified (may be empty).

        Your tasks are:
        1. Security Review Scope
           - Review the security implications of FILE_CHANGES, focusing on "+" and "-" lines but reasoning about full-module behavior.
           - Only produce findings that are fully justified by FILE_CHANGES, ORIGINAL_FILE[[RELEVANT_CONTEXT_PATCH_JUSTIFICATION_SUFFIX]].
           - If no real issues exist, return an empty reviews list.
           - If ORIGINAL_FILE is empty, ignore it.
           [[RELEVANT_CONTEXT_NAMED]]

        Output requirements:
        - Output ONLY a JSON object: {\"reviews\": [...]}
        - Each review must use ONLY the schema fields in [[REVIEW_SCHEMA_FIELDS]] (no extra keys).
        - The reasoning must explicitly identify externally controlled inputs and the trust boundary.
        - If no issues, return {\"reviews\": []}.

      security_review_file: |-
        You are a thorough security engineer specializing in RTL security for SystemVerilog designs.
        Always tie your identified issues directly to the evidence in FILE[[RELEVANT_CONTEXT_FILE_EVIDENCE_SUFFIX]].
        Do not introduce new security conclusions that are not supported by the specific code[[RELEVANT_CONTEXT_CODE_PROVIDED_SUFFIX]] provided.

        You will be given:
        1. FILE - a SystemVerilog source file
        [[RELEVANT_CONTEXT_INPUT_MODULE_PACKAGE]]

        Your tasks are:
        1. Security Review Scope
           - Review the security implications of FILE.
           - Only produce findings that are fully justified by FILE[[RELEVANT_CONTEXT_FILE_EVIDENCE_SUFFIX]].
           - If no real issues exist, return an empty reviews list.
           [[RELEVANT_CONTEXT_NAMED]]

        Output requirements:
        - Output ONLY a JSON object: {\"reviews\": [...]}
        - Each review must use ONLY the schema fields in [[REVIEW_SCHEMA_FIELDS]] (no extra keys).
        - The reasoning must explicitly identify externally controlled inputs and the trust boundary.
        - If no issues, return {\"reviews\": []}.

      security_review_checks: |-
        [[HARDWARE_CWE_GUIDANCE]]

        SystemVerilog-specific security footguns to explicitly evaluate (and tie back to the CWEs above):
        - `interface` / `modport` directionality errors that unintentionally expose privileged control (often CWE-1262 / CWE-1189).
        - Parameterization/`localparam` misuse where security gates can be disabled via overrides (often CWE-1234 / CWE-1191).
        - `bind` inserted logic or assertions changing behavior in synthesizable builds (often CWE-1191 / CWE-1234).
        - Use of DPI/PLI/VPI in synthesizable contexts or mixed RTL/TB packages leaking secrets or enabling backdoors (CWE-1191 / CWE-1431).
        - `unique/priority case` and incomplete case coverage leading to unintended privilege paths or latch inference (often CWE-1262 / CWE-1298).
        [[RELEVANT_CONTEXT_ASSERTION_GUIDANCE]]
          (If properties imply missing enforcement logic, map to the relevant CWE, commonly CWE-1262 / CWE-1191.)

      validation_review: |-
        You will be given:
        SNIPPET: The relevant SystemVerilog code snippet.
        [[RELEVANT_CONTEXT_ADDITIONAL_DETAILS]]
        REVIEW: A list of potential security issues discovered.

        Your task is to:
        1. Validate each item against SNIPPET[[RELEVANT_CONTEXT_SNIPPET_VALIDATION_SUFFIX]].
        2. Remove false positives or issues already mitigated (e.g., deterministic reset, sticky locks, explicit privilege checks).
        3. Keep only issues that definitely represent real security risks.
        4. If no real issues remain, respond with an empty array: [].

      snippet_security_summary: |-
        Summarize the security implications of these SystemVerilog changes in one paragraph.
        Focus on CWE-root-cause patterns (secure defaults/reset, access control/debug, data lifetime/zeroization,
        races/glitches/CDC, isolation/overlap).
        Be concise and actionable.

      attempt_fix: |-
        Based on the identified RTL security issues:\n
        {issues}\n
        and the patch:\n
        {patch}\n
        Please update the patch so it fixes these issues.
        Output ONLY the patch diff, with minimal changes.
  verilog:
